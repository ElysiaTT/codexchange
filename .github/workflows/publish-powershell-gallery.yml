name: Publish to PowerShell Gallery

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish codexchange.ps1
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate script metadata
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          Install-Module PowerShellGet -Scope CurrentUser -Force -AllowClobber
          Test-ScriptFileInfo -Path .\codexchange.ps1

      - name: Publish script
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Set-StrictMode -Version Latest
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw "Missing GitHub Actions secret: PSGALLERY_API_KEY"
          }

          Publish-Script `
            -Path .\codexchange.ps1 `
            -Repository PSGallery `
            -NuGetApiKey $env:PSGALLERY_API_KEY `
            -Verbose
